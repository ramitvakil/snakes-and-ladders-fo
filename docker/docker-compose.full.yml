version: "3.9"

# Full-stack Docker overlay (for CI or onboarding)
# Usage: docker compose -f docker-compose.yml -f docker-compose.full.yml up -d
services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: fno-game-server
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fno_game?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: docker-dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
      args:
        VITE_API_URL: http://localhost:3001
        VITE_WS_URL: http://localhost:3001
    container_name: fno-game-client
    ports:
      - "8080:80"
    depends_on:
      - server
